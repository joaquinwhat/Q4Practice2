<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Practice2</title>
</head>
<body>
    <h1>Switch Statement</h1>

    <button class="btn btn-info" onclick="teamRank()">Rank</button>


    <script>

        function teamRank() {
            var rank = "1st";

            switch(rank) {
                case "1st":
                    alert("Champion!");
                    break;
                case "2nd":
                    alert("Second googoogaga");
                    break;
                case "3rd":
                    alert("3rd loool");
                    break;
                case "4th":
                    alert("NT u 4th");
                    break;
                default:
                    alert("Rank could not be determined.");
            }
        }


        let team = "Red";

        switch(team) {
            case "Red":
                alert("Go Red Bulldogs!");
                break;
            case "Blue":
                alert("Go Blue Bears! For the win!");
                break;
            case "Green":
                alert("Go Green Hornets! Laban!");
                break;
            case "Yellow":
                alert("Go Yellow Tigers! Malakas!");
                break;
            default:
                alert("Team could not be determined.");
        }
    </script>
</body>
</html>
